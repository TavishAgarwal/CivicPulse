# ============================================================
# CivicPulse — Lightweight Development Stack (No Kafka)
# Usage: docker-compose -f docker-compose.lite.yml up --build
#
# This stripped-down setup removes Kafka + Zookeeper and uses
# Redis for any message passing. Ideal for demos and quick
# evaluation by hackathon judges.
# ============================================================

version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: civicpulse-postgres
    environment:
      POSTGRES_USER: civicpulse
      POSTGRES_PASSWORD: password
      POSTGRES_DB: civicpulse_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schemas/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./data/synthetic/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: civicpulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: civicpulse-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      CIVICPULSE_ENV: development
      DATABASE_URL: postgresql://civicpulse:password@postgres:5432/civicpulse_dev
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: ""
    volumes:
      - ./src/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React Dashboard ─────────────────────────────────────────
  dashboard:
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile
    container_name: civicpulse-dashboard
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_ENV: development
    volumes:
      - ./src/dashboard:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:

networks:
  default:
    name: civicpulse-lite-network
