name: CivicPulse CI

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main]

jobs:
  # ── Python Backend Tests ────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    name: Python Tests & Coverage
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/api/requirements.txt -r src/ml/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term --cov-fail-under=75

  # ── Dashboard Build ─────────────────────────────────────
  dashboard-build:
    runs-on: ubuntu-latest
    name: Dashboard Build Check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: src/dashboard
        run: npm ci

      - name: Build
        working-directory: src/dashboard
        env:
          VITE_FIREBASE_API_KEY: test
          VITE_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: test
          VITE_FIREBASE_STORAGE_BUCKET: test.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000:web:test'
          VITE_GOOGLE_MAPS_API_KEY: test
          VITE_GEMINI_API_KEY: test
        run: npm run build

  # ── Flutter Analysis ────────────────────────────────────
  flutter-analyze:
    runs-on: ubuntu-latest
    name: Flutter Analysis
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze --no-fatal-infos
