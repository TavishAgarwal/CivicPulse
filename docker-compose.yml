version: "3.9"

# ============================================================
# CivicPulse — Local Development Stack
# Usage: docker-compose up --build
# ============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: civicpulse-postgres
    environment:
      POSTGRES_USER: civicpulse
      POSTGRES_PASSWORD: password
      POSTGRES_DB: civicpulse_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schemas/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: civicpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (required by Kafka) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: civicpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  # ── Kafka ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: civicpulse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: civicpulse-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      CIVICPULSE_ENV: development
      DATABASE_URL: postgresql://civicpulse:password@postgres:5432/civicpulse_dev
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./src/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Signal Ingestion Workers ────────────────────────────────
  ingestion:
    build:
      context: ./src/ingestion
      dockerfile: Dockerfile
    container_name: civicpulse-ingestion
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      CIVICPULSE_ENV: development
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://civicpulse:password@postgres:5432/civicpulse_dev
    volumes:
      - ./src/ingestion:/app
      - ./data/synthetic:/data/synthetic   # Mock data for dev
    command: python worker.py --use-mocks

  # ── ML Engine ──────────────────────────────────────────────
  ml:
    build:
      context: ./src/ml
      dockerfile: Dockerfile
    container_name: civicpulse-ml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CIVICPULSE_ENV: development
      DATABASE_URL: postgresql://civicpulse:password@postgres:5432/civicpulse_dev
      REDIS_URL: redis://redis:6379/0
      ML_MODEL_PATH: /models/fusion/latest/
      CSS_HIGH_THRESHOLD: 56
      CSS_CRITICAL_THRESHOLD: 76
    volumes:
      - ./src/ml:/app
      - ml_models:/models
    command: python scheduler.py --interval 3600   # Recompute CSS every hour

  # ── React Dashboard ─────────────────────────────────────────
  dashboard:
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile
    container_name: civicpulse-dashboard
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_ENV: development
    volumes:
      - ./src/dashboard:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # ── Dispatch Engine ─────────────────────────────────────────
  dispatch:
    build:
      context: ./src/dispatch
      dockerfile: Dockerfile
    container_name: civicpulse-dispatch
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CIVICPULSE_ENV: development
      DATABASE_URL: postgresql://civicpulse:password@postgres:5432/civicpulse_dev
      REDIS_URL: redis://redis:6379/0
      DISPATCH_MATCH_COUNT: 5
      DISPATCH_CONFIRM_TIMEOUT_MINUTES: 15
      FEATURE_AUTO_DISPATCH: "false"    # Always false in dev
    volumes:
      - ./src/dispatch:/app
    command: python engine.py

  # ── Kafka UI (Dev Tool) ─────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: civicpulse-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    profiles:
      - tools

  # ── Adminer (DB GUI, Dev Tool) ──────────────────────────────
  adminer:
    image: adminer:latest
    container_name: civicpulse-adminer
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  ml_models:

networks:
  default:
    name: civicpulse-network
